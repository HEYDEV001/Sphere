spring:
  application:
    name: api-gateway


  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: userService
              uri: lb://USERSERVICE
              predicates:
                - Path=/api/v1/user/**
              filters:
                - StripPrefix=2

            - id: postService
              uri: lb://POSTSERVICE
              predicates:
                - Path=/api/v1/posts/**
              filters:
                - StripPrefix=2


server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

